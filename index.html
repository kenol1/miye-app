/* ── 3. Access code entry ─────────────────────── */
function AccessCodeScreen({user,onGranted}){
  const[code,setCode]=useState('');
  const[loading,setLoading]=useState(false);
  const[error,setError]=useState('');
  const[success,setSuccess]=useState(false);

  const handleSubmit=async()=>{
    const trimmed=code.trim().toUpperCase();
    if(!trimmed)return setError('Please enter your access code.');
    setError('');setLoading(true);

    // 1. Find code
    const{data:codeRow,error:findErr}=await supabaseClient
      .from('access_codes')
      .select('*')
      .eq('code',trimmed)
      .eq('used',false)
      .single();

    if(findErr||!codeRow){
      setLoading(false);
      return setError('That code is invalid or has already been used. Double-check and try again.');
    }

    // 2. Mark code as used
    const{error:updateErr}=await supabaseClient
      .from('access_codes')
      .update({used:true,used_by:user.email})
      .eq('code',trimmed);

    if(updateErr){setLoading(false);return setError('Something went wrong. Please try again.');}

    // 3. Grant access in profiles
    const{error:profileErr}=await supabaseClient
      .from('profiles')
      .upsert({id:user.id,email:user.email,has_access:true},{onConflict:'id'});

    if(profileErr){setLoading(false);return setError('Something went wrong. Please try again.');}

    setSuccess(true);
    setTimeout(()=>onGranted(),1200);
  };

  return(
    <div style={{minHeight:'100vh',background:'var(--bg)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'24px'}}>
      <div className="fu" style={{width:'100%',maxWidth:420}}>
        <div style={{textAlign:'center',marginBottom:28}}>
          <MiyeLogo size={34} textColor="var(--forest)"/>
        </div>

        <div style={{background:'var(--white)',borderRadius:'var(--rad-xl)',padding:'28px 24px',boxShadow:'var(--shadow)',border:'1px solid var(--border)'}}>
          {success?(
            <div style={{textAlign:'center',padding:'16px 0'}}>
              <div style={{fontSize:40,marginBottom:12}}>🎉</div>
              <h2 style={{fontFamily:"'Nunito',sans-serif",fontSize:'1.3rem',fontWeight:900,color:'var(--mid)',marginBottom:6}}>Access granted!</h2>
              <p style={{fontSize:14,color:'var(--ink-3)'}}>Taking you in now…</p>
            </div>
          ):(
            <>
              <div style={{marginBottom:20}}>
                <div style={{width:48,height:48,background:'var(--green-light)',borderRadius:14,display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,marginBottom:14}}>🔑</div>
                <h2 style={{fontFamily:"'Nunito',sans-serif",fontSize:'1.3rem',fontWeight:900,color:'var(--ink)',marginBottom:6}}>Enter your access code</h2>
                <p style={{fontSize:14,color:'var(--ink-3)',lineHeight:1.6}}>
                  Miye is invite-only right now. Enter the access code you were given to unlock the app.
                </p>
              </div>

              <p style={{fontSize:12,fontWeight:700,color:'var(--ink-4)',textTransform:'uppercase',letterSpacing:'0.07em',marginBottom:10}}>Access code</p>
              <div style={{marginBottom:16}}>
                <div style={{border:'1.5px solid var(--border)',borderRadius:'var(--rad-xs)',overflow:'hidden',background:'var(--bg)',transition:'border-color 0.15s'}}
                  onFocusCapture={e=>e.currentTarget.style.borderColor='var(--mid)'}
                  onBlurCapture={e=>e.currentTarget.style.borderColor='var(--border)'}
                >
                  <input
                    type="text" value={code} onChange={e=>setCode(e.target.value.toUpperCase())}
                    placeholder="MIYE-XXXX" maxLength={20}
                    onKeyDown={e=>e.key==='Enter'&&handleSubmit()}
                    style={{width:'100%',padding:'14px 16px',fontSize:18,fontWeight:800,color:'var(--forest)',background:'transparent',border:'none',outline:'none',fontFamily:"'Nunito',sans-serif",letterSpacing:'0.1em',textAlign:'center'}}
                  />
                </div>
              </div>

              {error&&(
                <div style={{background:'var(--red-soft)',border:'1px solid rgba(192,57,43,0.15)',borderRadius:'var(--rad-xs)',padding:'10px 14px',marginBottom:14,fontSize:13,color:'var(--red)',lineHeight:1.5}}>
                  {error}
                </div>
              )}

              <PrimaryBtn onClick={handleSubmit} loading={loading} disabled={!code.trim()}>
                {loading?'Checking code…':'Unlock Miye →'}
              </PrimaryBtn>

              <p style={{fontSize:12,color:'var(--ink-4)',textAlign:'center',marginTop:14,lineHeight:1.5}}>
                Signed in as <strong style={{color:'var(--ink-3)'}}>{user.email}</strong>
              </p>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

/* ────────────────────────────────────────────────────────────
   LOADING SCREEN (results anticipation)
   ──────────────────────────────────────────────────────────── */
function LoadingScreen({onDone}){
  const steps=['Crunching your numbers…','Mapping your lifestyle…','Your picture is ready ✓'];
  const[step,setStep]=useState(0);
  useEffect(()=>{
    const t1=setTimeout(()=>setStep(1),600);
    const t2=setTimeout(()=>setStep(2),1200);
    const t3=setTimeout(onDone,1900);
    return()=>{clearTimeout(t1);clearTimeout(t2);clearTimeout(t3)};
  },[]);
  return(
    <div style={{minHeight:'100vh',background:'var(--forest)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'2rem',position:'relative',overflow:'hidden'}}>
      <div style={{position:'absolute',inset:0,backgroundImage:'linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px)',backgroundSize:'40px 40px'}}/>
      <div style={{position:'relative',zIndex:1,textAlign:'center',maxWidth:320}}>
        <div style={{marginBottom:32,display:'flex',justifyContent:'center'}}>
          <MiyeLogo size={40} textColor="#fff"/>
        </div>
        <Spinner size={52} color="#5DC130"/>
        <div style={{display:'flex',flexDirection:'column',gap:14,marginTop:36}}>
          {steps.map((s,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:12,opacity:i<=step?1:0.2,transition:'opacity 0.5s ease'}}>
              <div style={{width:22,height:22,borderRadius:'50%',background:i<step?'#5DC130':i===step?'rgba(93,193,48,0.35)':'rgba(255,255,255,0.08)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,transition:'background 0.4s'}}>
                {i<step?<span style={{color:'#fff',fontSize:11,fontWeight:800}}>✓</span>:<div style={{width:8,height:8,borderRadius:'50%',background:i===step?'#5DC130':'transparent',animation:i===step?'pulse 1s infinite':'none'}}/>}
              </div>
              <span style={{fontSize:15,color:i<=step?'rgba(255,255,255,0.9)':'rgba(255,255,255,0.25)',fontWeight:i===step?600:400,transition:'all 0.4s'}}>{s}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

const fmt=n=>'₦'+Math.round(n||0).toLocaleString('en-NG');
const fmtShort=n=>{const v=Math.round(n||0);return v>=1000000?'₦'+(v/1000000).toFixed(1)+'M':v>=1000?'₦'+(v/1000).toFixed(0)+'k':'₦'+v.toLocaleString('en-NG')};
const pct=(a,b)=>b>0?Math.round((a/b)*100):0;
const deepClone=o=>JSON.parse(JSON.stringify(o));

function calcTotals(ess,life){
  const housing=(ess.housing.annualRent/12)+ess.housing.utilities+ess.housing.generatorFuel+ess.housing.estateDues;
  const food=ess.food.groceries+ess.food.eatingOut;
  const transport=ess.transport.fuel+ess.transport.publicTransport+ess.transport.rideHailing;
  const tech=ess.technology.dataInternet+ess.technology.phoneBills;
  const health=(ess.health.insurance/12)+ess.health.pharmacy;
  const essTotal=housing+food+transport+tech+health;
  const personal=life.personal.clothing+life.personal.grooming;
  const ent=life.entertainment.outings+life.entertainment.subscriptions+life.entertainment.gym;
  const family=life.familyObligations.familySupport+life.familyObligations.domesticHelp+life.familyObligations.savings+life.familyObligations.customAmount;
  const lifeTotal=personal+ent+family;
  const total=essTotal+lifeTotal;
  const cats=[
    {category:'Housing',amount:housing},{category:'Food',amount:food},{category:'Transport',amount:transport},
    {category:'Technology',amount:tech},{category:'Health',amount:health},{category:'Personal',amount:personal},
    {category:'Entertainment',amount:ent},{category:'Family & Obligations',amount:family},
  ].map(d=>({...d,pct:pct(d.amount,total)})).sort((a,b)=>b.amount-a.amount);
  return{housing,food,transport,tech,health,essTotal,personal,ent,family,lifeTotal,total,cats};
}

function DonutChart({cats,total,size=180,label=''}){
  const[hov,setHov]=useState(null);
  const cx=size/2,cy=size/2,R=size*0.41,ir=size*0.27;
  if(!total)return(<svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}><circle cx={cx} cy={cy} r={R} fill="none" stroke="#E2E0DA" strokeWidth={size*0.13}/><text x={cx} y={cy+5} textAnchor="middle" fill="#A8A89E" fontSize={size*0.07} fontFamily="Plus Jakarta Sans">Empty</text></svg>);
  let ang=-Math.PI/2;
  const slices=cats.filter(d=>d.amount>0).map((d,i)=>{
    const frac=d.amount/total,sw=frac*2*Math.PI,sa=ang;ang+=sw;const la=sw>Math.PI?1:0,mid=sa+sw/2;
    const x1=cx+R*Math.cos(sa),y1=cy+R*Math.sin(sa),x2=cx+R*Math.cos(ang),y2=cy+R*Math.sin(ang);
    const ix1=cx+ir*Math.cos(ang),iy1=cy+ir*Math.sin(ang),ix2=cx+ir*Math.cos(sa),iy2=cy+ir*Math.sin(sa);
    return{...d,path:`M${x1} ${y1} A${R} ${R} 0 ${la} 1 ${x2} ${y2} L${ix1} ${iy1} A${ir} ${ir} 0 ${la} 0 ${ix2} ${iy2} Z`,frac,mid,color:CAT_COLORS[d.category]||CHART_COLORS[i%8]};
  });
  const hSlice=hov?slices.find(s=>s.category===hov):null;
  return(
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{overflow:'visible'}}>
      {slices.map(s=>{const isH=hov===s.category;return<path key={s.category} d={s.path} fill={s.color} stroke="#F8F7F3" strokeWidth="1.5" style={{transform:isH?`translate(${Math.cos(s.mid)*5}px,${Math.sin(s.mid)*5}px)`:'none',transition:'all 0.22s ease',cursor:'pointer',opacity:hov&&!isH?0.45:1}} onMouseEnter={()=>setHov(s.category)} onMouseLeave={()=>setHov(null)} onTouchStart={()=>setHov(s.category)} onTouchEnd={()=>setTimeout(()=>setHov(null),800)}/>;})}
      {hSlice?(<><text x={cx} y={cy-size*0.07} textAnchor="middle" fill={hSlice.color} fontSize={size*0.065} fontWeight="700" fontFamily="Nunito,sans-serif">{hSlice.category.split(' ')[0]}</text><text x={cx} y={cy+size*0.05} textAnchor="middle" fill="#0F0F0D" fontSize={size*0.075} fontWeight="800" fontFamily="Nunito,sans-serif">{fmtShort(hSlice.amount)}</text><text x={cx} y={cy+size*0.13} textAnchor="middle" fill="#6A6A60" fontSize={size*0.06} fontFamily="Plus Jakarta Sans">{Math.round(hSlice.frac*100)}%</text></>):(<>{label&&<text x={cx} y={cy-size*0.06} textAnchor="middle" fill="#6A6A60" fontSize={size*0.062} fontFamily="Plus Jakarta Sans">{label}</text>}<text x={cx} y={label?cy+size*0.06:cy+size*0.04} textAnchor="middle" fill="#0F0F0D" fontSize={size*0.082} fontWeight="800" fontFamily="Nunito,sans-serif">{fmtShort(total)}</text><text x={cx} y={label?cy+size*0.13:cy+size*0.12} textAnchor="middle" fill="#A8A89E" fontSize={size*0.055} fontFamily="Plus Jakarta Sans">/ month</text></>)}
    </svg>
  );
}

        <button onClick={onResults} disabled={!canGo} style={{background:canGo?'var(--forest)':'var(--bg-2)',color:canGo?'#fff':'var(--ink-4)',border:'none',borderRadius:'var(--rad-xs)',padding:'14px 22px',fontFamily:"'Nunito',sans-serif",fontWeight:800,fontSize:15,cursor:canGo?'pointer':'not-allowed',flexShrink:0,boxShadow:canGo?'0 2px 10px rgba(15,61,40,0.35)':'none',transition:'all 0.2s'}}>See my number →</button>
      </div>
    </div>
  </div>);
}

/* ── ResultsPage ──────────────────────────────── */
function ResultsPage({path,income,ess,life,onBack,onDesiredLife,onCompare,hasComparison,onSignOut}){
  const t=calcTotals(ess,life);const isCurrent=path==='current';
  const gap=income-t.total;const coverPct=Math.min(100,pct(income,t.total));
  const gapColor=gap>=0?'var(--mid)':coverPct>=70?'var(--amber)':'var(--red)';
  const safety=t.total*0.25;
  const insights=useMemo(()=>{
    const r=[];if(!t.total)return r;
    r.push({type:'info',msg:`Your life costs ₦${Math.round(t.total/30).toLocaleString('en-NG')} every single day. That's your floor.`});
    const ep=pct(t.essTotal,t.total);
    if(ep>80)r.push({type:'warning',msg:`${ep}% of your spending is locked into essentials. Consider where you can create more flexibility.`});
    else if(ep>=55)r.push({type:'success',msg:`${ep}% on essentials, ${100-ep}% on lifestyle. A healthy balance.`});
    else r.push({type:'warning',msg:`Lifestyle spend (${100-ep}%) is outrunning essentials (${ep}%). Make sure income keeps up.`});
    const sav=life.familyObligations.savings;
    if(!sav)r.push({type:'warning',msg:`No savings in your plan. Add at least ${fmt(Math.round(t.total*0.1))}/mo — pay yourself first.`});
    else{const sp=pct(sav,t.total);r.push({type:sp>=10?'success':'warning',msg:`Saving ${fmt(sav)}/mo (${sp}%). ${sp>=10?'Solid discipline.':'Aim for 10–20%.'}`});}
    if(income>0){if(gap>=0)r.push({type:'success',msg:`You earn ${fmt(gap)} more than your lifestyle costs. Put that gap to work.`});else r.push({type:'warning',msg:`You're short by ${fmt(Math.abs(gap))}/month. That gap is quietly compounding.`});}
    return r;
  },[t,income,life]);

  return(<div style={{minHeight:'100vh',background:'var(--bg)',paddingBottom:isCurrent?100:40}}>
    <AppHeader onBack={onBack} backLabel="Adjust" onSignOut={onSignOut}/>
    <main style={{maxWidth:640,margin:'0 auto',padding:'24px 16px 16px'}}>
      <div className="fu" style={{background:'var(--forest)',borderRadius:'var(--rad-xl)',padding:'28px 24px',marginBottom:14,position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',top:-50,right:-50,width:180,height:180,borderRadius:'50%',background:'rgba(93,193,48,0.07)',pointerEvents:'none'}}/>
        <p style={{fontSize:11,fontWeight:700,color:'rgba(255,255,255,0.4)',letterSpacing:'0.12em',textTransform:'uppercase',marginBottom:6}}>{isCurrent?'Your current life costs':'Your desired life costs'}</p>
        <div style={{fontFamily:"'Nunito',sans-serif",fontSize:'clamp(2.4rem,7vw,3.8rem)',fontWeight:900,color:'#fff',lineHeight:1,marginBottom:6}}>{fmt(t.total)}</div>
        <p style={{fontSize:14,color:'rgba(255,255,255,0.45)',marginBottom:income>0?14:0}}>per month · {fmt(t.total*12)} per year</p>
        {income>0&&(<div style={{display:'inline-flex',alignItems:'center',gap:8,background:gap>=0?'rgba(93,193,48,0.15)':'rgba(232,85,85,0.15)',borderRadius:20,padding:'6px 14px',border:`1px solid ${gap>=0?'rgba(93,193,48,0.25)':'rgba(232,85,85,0.2)'}`}}><div style={{width:7,height:7,borderRadius:'50%',background:gapColor}}/><span style={{fontSize:13,fontWeight:700,color:gap>=0?'#5DC130':'#EF8080'}}>{gap>=0?`+${fmt(gap)} surplus vs income`:`${fmt(Math.abs(gap))} short of income`}</span></div>)}
      </div>
      <div className="fu d1" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:14}}>
        {[{l:'Survival minimum',v:fmt(t.essTotal),s:'Essentials only'},{l:'Full lifestyle',v:fmt(t.total),s:'Everything included'},{l:'Income gap',v:(gap>=0?'+':'')+fmt(gap),s:gap>=0?'You have headroom':'Gap to close',a:gapColor},{l:'Safe target (+25%)',v:fmt(t.total+safety),s:'Recommended income'}].map((s,i)=>(
          <div key={i} className={`fu d${i+2}`} style={{background:'var(--white)',border:'1px solid var(--border)',borderRadius:'var(--rad)',padding:'16px',boxShadow:'var(--shadow-xs)'}}><p style={{fontSize:11,fontWeight:700,color:'var(--ink-4)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:6}}>{s.l}</p><p style={{fontFamily:"'Nunito',sans-serif",fontSize:'1.35rem',fontWeight:900,color:s.a||'var(--ink)',lineHeight:1,marginBottom:4}}>{s.v}</p><p style={{fontSize:11,color:'var(--ink-4)'}}>{s.s}</p></div>
        ))}
      </div>
      {income>0&&(<div className="fu d3" style={{background:'var(--white)',border:'1px solid var(--border)',borderRadius:'var(--rad)',padding:'18px',marginBottom:14,boxShadow:'var(--shadow-xs)'}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:10}}><span style={{fontSize:14,fontWeight:600,color:'var(--ink)'}}>Income coverage</span><span style={{fontFamily:"'Nunito',sans-serif",fontSize:'1.5rem',fontWeight:900,color:gapColor}}>{coverPct}%</span></div><div style={{height:10,background:'var(--bg-2)',borderRadius:5,overflow:'hidden',marginBottom:8}}><div style={{height:'100%',width:`${coverPct}%`,background:gapColor,borderRadius:5,transition:'width 1.2s cubic-bezier(0.4,0,0.2,1)'}}/></div><div style={{display:'flex',justifyContent:'space-between'}}><span style={{fontSize:11,color:'var(--ink-4)'}}>₦0</span><span style={{fontSize:11,color:'var(--ink-4)'}}>{fmt(t.total)}</span></div></div>)}

      <div className="fu d7" style={{display:'flex',gap:10}}><button onClick={onBack} style={{flex:1,padding:'13px',background:'var(--white)',color:'var(--ink-2)',border:'1px solid var(--border)',borderRadius:'var(--rad-xs)',fontFamily:'inherit',fontWeight:600,fontSize:14,cursor:'pointer'}}>← Adjust</button><button onClick={()=>window.print()} style={{flex:1,padding:'13px',background:'var(--bg-2)',color:'var(--ink-2)',border:'1px solid var(--border)',borderRadius:'var(--rad-xs)',fontFamily:'inherit',fontWeight:600,fontSize:14,cursor:'pointer'}}>Save PDF</button></div>

      {hasComparison?(<button onClick={onCompare} style={{width:'100%',padding:'15px',background:'var(--forest)',color:'#fff',border:'none',borderRadius:'var(--rad-xs)',fontFamily:"'Nunito',sans-serif",fontWeight:800,fontSize:15,cursor:'pointer',boxShadow:'0 2px 10px rgba(15,61,40,0.35)',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}><span>⇄</span> Compare current vs desired life</button>):(<div><p style={{fontSize:13,color:'var(--ink-3)',marginBottom:10,textAlign:'center'}}><strong style={{color:'var(--ink)'}}>Now you know your reality.</strong> Want to see what a better life would cost?</p><button onClick={onDesiredLife} style={{width:'100%',padding:'15px',background:'var(--forest)',color:'#fff',border:'none',borderRadius:'var(--rad-xs)',fontFamily:"'Nunito',sans-serif",fontWeight:800,fontSize:15,cursor:'pointer',boxShadow:'0 2px 10px rgba(15,61,40,0.35)',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>Design my desired life <span style={{fontSize:18}}>→</span></button></div>)}

  </div>);

/* ── ComparisonPage ───────────────────────────── */
function ComparisonPage({currentIncome,currentEss,currentLife,desiredEss,desiredLife,onBack,onSignOut}){
  const curr=calcTotals(currentEss,currentLife);const des=calcTotals(desiredEss,desiredLife);
  const delta=des.total-curr.total;const incomeGap=des.total-(currentIncome||curr.total);
  const allCats=['Housing','Food','Transport','Technology','Health','Personal','Entertainment','Family & Obligations'];
  const currMap=Object.fromEntries(curr.cats.map(c=>[c.category,c.amount]));
  const desMap=Object.fromEntries(des.cats.map(c=>[c.category,c.amount]));
  const maxCatVal=Math.max(...allCats.map(c=>Math.max(currMap[c]||0,desMap[c]||0)),1);
  return(<div style={{minHeight:'100vh',background:'var(--bg)',paddingBottom:40}}>
    <AppHeader onBack={onBack} backLabel="Back" onSignOut={onSignOut}/>

      <div className="fu d1" style={{background:'var(--forest)',borderRadius:'var(--rad-xl)',padding:'28px 24px',marginBottom:16,position:'relative',overflow:'hidden'}}><div style={{position:'absolute',top:-40,right:-40,width:160,height:160,borderRadius:'50%',background:'rgba(93,193,48,0.08)'}}/><p style={{fontSize:11,fontWeight:700,color:'rgba(255,255,255,0.4)',letterSpacing:'0.12em',textTransform:'uppercase',marginBottom:8}}>To upgrade your life, you need</p><div style={{fontFamily:"'Nunito',sans-serif",fontSize:'clamp(2.2rem,7vw,3.5rem)',fontWeight:900,color:'#5DC130',lineHeight:1,marginBottom:6}}>+{fmt(delta)}</div><p style={{fontSize:15,color:'rgba(255,255,255,0.55)',marginBottom:16}}>more every month · +{fmt(delta*12)} per year</p>{currentIncome>0&&(<div style={{background:'rgba(255,255,255,0.06)',borderRadius:'var(--rad-xs)',padding:'12px 16px',display:'inline-block'}}><p style={{fontSize:13,color:'rgba(255,255,255,0.5)',marginBottom:4}}>Your income gap to desired life</p><p style={{fontFamily:"'Nunito',sans-serif",fontSize:'1.3rem',fontWeight:900,color:incomeGap<=0?'#5DC130':'#EF8080'}}>{incomeGap<=0?'You already earn enough ✓':`${fmt(incomeGap)} short`}</p></div>)}</div>
      <div className="fu d2" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
        {[{title:'Current life',t:curr,accent:'var(--mid)'},{title:'Desired life',t:des,accent:'#7B2560'}].map((s,i)=>(<div key={i} style={{background:'var(--white)',border:'1px solid var(--border)',borderRadius:'var(--rad)',padding:'16px',boxShadow:'var(--shadow-xs)',textAlign:'center'}}><p style={{fontSize:12,fontWeight:700,color:s.accent,textTransform:'uppercase',letterSpacing:'0.07em',marginBottom:12}}>{s.title}</p><div style={{display:'flex',justifyContent:'center',marginBottom:8}}><DonutChart cats={s.t.cats} total={s.t.total} size={140} label={s.title.split(' ')[0]}/></div><p style={{fontFamily:"'Nunito',sans-serif",fontSize:'1.05rem',fontWeight:900,color:'var(--ink)'}}>{fmt(s.t.total)}<span style={{fontSize:12,fontWeight:400,color:'var(--ink-4)'}}>/mo</span></p></div>))}
      </div>
      <div className="fu d3" style={{background:'var(--white)',border:'1px solid var(--border)',borderRadius:'var(--rad)',padding:'20px',marginBottom:16,boxShadow:'var(--shadow-xs)'}}><p style={{fontSize:12,fontWeight:700,color:'var(--ink-4)',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:16}}>Category by category</p><div style={{display:'flex',gap:16,marginBottom:12}}><div style={{display:'flex',alignItems:'center',gap:6}}><div style={{width:10,height:10,borderRadius:3,background:'var(--mid)'}}/><span style={{fontSize:12,color:'var(--ink-3)'}}>Current</span></div><div style={{display:'flex',alignItems:'center',gap:6}}><div style={{width:10,height:10,borderRadius:3,background:'#7B2560'}}/><span style={{fontSize:12,color:'var(--ink-3)'}}>Desired</span></div></div>
        {allCats.map(cat=>{const c=currMap[cat]||0,d=desMap[cat]||0;if(c===0&&d===0)return null;const diff=d-c,cW=Math.round((c/maxCatVal)*100),dW=Math.round((d/maxCatVal)*100);return(<div key={cat} style={{marginBottom:14}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:5}}><span style={{fontSize:13,color:'var(--ink-2)',fontWeight:500}}>{cat}</span><span style={{fontSize:12,fontWeight:700,color:diff>0?'#7B2560':diff<0?'var(--mid)':'var(--ink-4)'}}>{diff>0?'+':diff<0?'':'±'}{fmt(diff)}</span></div><div style={{display:'flex',flexDirection:'column',gap:4}}>{[{v:c,w:cW,color:'var(--mid)',label:fmt(c)},{v:d,w:dW,color:'#7B2560',label:fmt(d)}].map((b,bi)=>(<div key={bi} style={{display:'flex',alignItems:'center',gap:8}}><div style={{flex:1,height:7,background:'var(--bg-2)',borderRadius:4,overflow:'hidden'}}><div style={{height:'100%',width:`${b.w}%`,background:b.color,borderRadius:4,transition:'width 0.8s cubic-bezier(0.4,0,0.2,1)'}}/></div><span style={{fontSize:11,color:'var(--ink-4)',minWidth:70,textAlign:'right'}}>{b.label}</span></div>))}</div></div>);})}

      <div className="fu d5" style={{background:'var(--lime-soft)',border:'1px solid rgba(93,193,48,0.2)',borderRadius:'var(--rad)',padding:'18px',marginBottom:20}}><p style={{fontSize:14,color:'var(--forest)',lineHeight:1.7,fontWeight:500}}>{delta<=0?`Your desired lifestyle actually costs less than your current one. You're already living above your ideal — or your ideal is beautifully minimal.`:incomeGap<=0&&currentIncome>0?`You already earn enough to live your desired life. The question is — what's stopping you from making the shift?`:`To live your desired life, you need to earn ${fmt(incomeGap)} more per month. That's your number. Now go get it.`}</p></div>
      <div style={{display:'flex',gap:10}}><button onClick={onBack} style={{flex:1,padding:'13px',background:'var(--white)',color:'var(--ink-2)',border:'1px solid var(--border)',borderRadius:'var(--rad-xs)',fontFamily:'inherit',fontWeight:600,fontSize:14,cursor:'pointer'}}>← Back</button><button onClick={()=>window.print()} style={{flex:1,padding:'13px',background:'var(--forest)',color:'#fff',border:'none',borderRadius:'var(--rad-xs)',fontFamily:"'Nunito',sans-serif",fontWeight:800,fontSize:14,cursor:'pointer'}}>Save PDF</button></div>
    </main>
  </div>);
}

/* ────────────────────────────────────────────────────────────
   ROOT — Auth gate + App state
   ──────────────────────────────────────────────────────────── */
function Root(){
  const[authState,setAuthState]=useState('init');
  const[sentEmail,setSentEmail]=useState('');
  const[user,setUser]=useState(null);
  const[view,setView]=useState('landing');
  const[path,setPath]=useState('current');
  const[showLoader,setShowLoader]=useState(false);
  const[currIncome,setCurrIncome]=useState(0);
  const[currEss,setCurrEss]=useState(deepClone(EMPTY_ESS));
  const[currLife,setCurrLife]=useState(deepClone(EMPTY_LIFE));
  const[desIncome,setDesIncome]=useState(0);
  const[desEss,setDesEss]=useState(deepClone(EMPTY_ESS));
  const[desLife,setDesLife]=useState(deepClone(EMPTY_LIFE));
  const[doneCurrent,setDoneCurrent]=useState(false);
  const[doneDesired,setDoneDesired]=useState(false);

  useEffect(()=>{
    const checkSession=async()=>{
      try{
        const{data:{session}}=await supabaseClient.auth.getSession();
        if(session?.user){setUser(session.user);await checkAccess(session.user);}
        else setAuthState('login');
      }catch(e){console.error(e);setAuthState('login');}
    };
    checkSession();
    const{data:{subscription}}=supabaseClient.auth.onAuthStateChange(async(event,session)=>{
      if(event==='SIGNED_IN'&&session?.user){setUser(session.user);await checkAccess(session.user);}
      if(event==='SIGNED_OUT'){setUser(null);setAuthState('login');}
    });
    return()=>subscription.unsubscribe();
  },[]);

  const checkAccess=async(u)=>{
    try{
      const{data:profile}=await supabaseClient.from('profiles').select('has_access').eq('id',u.id).single();
      if(profile?.has_access){setAuthState('app');}
      else{
        await supabaseClient.from('profiles').upsert({id:u.id,email:u.email,has_access:false},{onConflict:'id'});
        setAuthState('code');
      }
    }catch(e){console.error(e);setAuthState('code');}
  };

  const handleSignOut=async()=>{
    await supabaseClient.auth.signOut();
  };

  const isCurrent=path==='current';
  const income=isCurrent?currIncome:desIncome;
  const setIncome=isCurrent?setCurrIncome:setDesIncome;
  const ess=isCurrent?currEss:desEss;
  const setEss=isCurrent?setCurrEss:setDesEss;
  const life=isCurrent?currLife:desLife;
  const setLife=isCurrent?setCurrLife:setDesLife;

  const goToResults=()=>setShowLoader(true);
  const afterLoad=()=>{
    setShowLoader(false);
    if(isCurrent)setDoneCurrent(true);else setDoneDesired(true);
    setView('results');
  };

  if(authState==='init')return<InitScreen/>;
  if(authState==='login')return<LoginScreen onSent={email=>{setSentEmail(email);setAuthState('check-email');}}/>;
  if(authState==='check-email')return<CheckEmailScreen email={sentEmail} onBack={()=>setAuthState('login')}/>;
  if(authState==='code')return<AccessCodeScreen user={user} onGranted={()=>setAuthState('app')}/>;

  // App — gated
  if(showLoader)return<LoadingScreen onDone={afterLoad}/>;
  if(view==='landing')return<LandingPage onCurrent={()=>{setPath('current');setView('input');}} onDesired={()=>{setPath('desired');setView('input');}} onSignOut={handleSignOut}/>;
  if(view==='input')return<InputPage path={path} income={income} setIncome={setIncome} ess={ess} setEss={setEss} life={life} setLife={setLife} onResults={goToResults} onBack={()=>setView('landing')} onSignOut={handleSignOut}/>;
  if(view==='results')return<ResultsPage path={path} income={income} ess={ess} life={life} onBack={()=>setView('input')} onDesiredLife={()=>{setPath('desired');setView('input');}} onCompare={()=>setView('comparison')} hasComparison={doneCurrent&&doneDesired} onSignOut={handleSignOut}/>;
  if(view==='comparison')return<ComparisonPage currentIncome={currIncome} currentEss={currEss} currentLife={currLife} desiredEss={desEss} desiredLife={desLife} onBack={()=>setView('results')} onSignOut={handleSignOut}/>;
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
</body>
</html>
